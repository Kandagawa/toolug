<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UGTrial System</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #000;
        }

        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://toolug.space.z.ai" 
        allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share" 
        allowfullscreen="true"
        scrolling="yes">
    </iframe>

</body>
</html>
